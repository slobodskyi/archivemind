<!-- ArchiveMind auth email · chrome duplicated across supabase/templates/*.html — Supabase content_path has no partial/include support, keep in sync by hand -->
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="color-scheme" content="dark">
<meta name="supported-color-schemes" content="dark">
<title>Confirm it's you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!--[if mso]>
<style type="text/css">
  table { border-collapse: collapse; }
  .am-container { width: 480px !important; }
</style>
<![endif]-->
<style>
  body, table, td { margin: 0; padding: 0; }
  body { background-color: #080808 !important; -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
  table { border-collapse: collapse !important; }
  img { border: 0; line-height: 100%; outline: none; text-decoration: none; }
  a { text-decoration: none; }
  @media only screen and (max-width: 520px) {
    .am-container { width: 100% !important; }
    .am-card { padding: 28px 22px !important; }
    .am-code { font-size: 26px !important; letter-spacing: 0.26em !important; }
  }
</style>
</head>
<body style="margin:0;padding:0;background-color:#080808;">
  <div style="display:none;font-size:1px;line-height:1px;max-height:0;max-width:0;opacity:0;overflow:hidden;mso-hide:all;">
    Your ArchiveMind confirmation code.
    &#8203;&zwnj;&nbsp;&#8203;&zwnj;&nbsp;&#8203;&zwnj;&nbsp;&#8203;&zwnj;&nbsp;&#8203;&zwnj;&nbsp;
  </div>
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#080808;">
    <tr>
      <td align="center" style="padding:48px 24px;">
        <table role="presentation" class="am-container" width="480" cellpadding="0" cellspacing="0" style="width:480px;max-width:480px;">
          <tr>
            <td align="center" style="padding:0 0 32px 0;">
              <a href="{{ .SiteURL }}" style="font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:15px;font-weight:700;letter-spacing:0.04em;color:#eceee8;text-decoration:none;">ArchiveMind</a>
            </td>
          </tr>
          <tr>
            <td class="am-card" bgcolor="#0b0b0b" style="background-color:#0b0b0b;border:1px solid rgba(255,255,255,0.07);border-radius:2px;padding:36px 32px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:10.5px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(236,238,232,0.36);padding:0 0 14px 0;">
                    Reauthentication
                  </td>
                </tr>
                <tr>
                  <td style="font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:21px;line-height:1.35;font-weight:700;letter-spacing:0.02em;color:#eceee8;padding:0 0 14px 0;">
                    Confirm it's you
                  </td>
                </tr>
                <tr>
                  <td style="font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:14px;line-height:1.65;color:rgba(236,238,232,0.62);padding:0 0 24px 0;">
                    Enter this code to continue:
                  </td>
                </tr>
                <tr>
                  <td style="padding:0 0 24px 0;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                      <tr>
                        <td align="center" bgcolor="#0d0d0d" style="background-color:#0d0d0d;border:1px solid rgba(255,255,255,0.07);border-radius:2px;padding:22px;">
                          <span class="am-code" style="font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:32px;font-weight:700;letter-spacing:0.4em;color:#39ff6a;">{{ .Token }}</span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
                <tr>
                  <td style="font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:11.5px;line-height:1.6;color:rgba(236,238,232,0.36);">
                    This code expires shortly. If you didn't request this, you can safely ignore this email.
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding:32px 0 0 0;font-family:'Space Mono','SFMono-Regular',Consolas,'Liberation Mono',Menlo,Courier,monospace;font-size:11px;color:rgba(236,238,232,0.36);">
              © ArchiveMind
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

packages:
  - "apps/*"
  - "packages/*"
allowBuilds:
  # Native postinstall scripts vetted 2026-07-10: sharp is Next's image
  # optimizer (and the worker's preview pipeline later); unrs-resolver backs
  # eslint-config-next's import resolution; esbuild powers tsup (worker build).
  # @google/genai + its protobufjs dep: official Google SDK postinstalls.
  '@google/genai': true
  esbuild: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
